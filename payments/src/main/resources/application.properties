spring.application.name=payments

# Kafka consumer configuration for payments module
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.LongSerializer

# Trust packages for JsonDeserializer (allow deserialization into these packages)
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.payments.dto,com.example.inventory.dto

# bootstrap servers are expected to be provided by environment/config; add here if needed
# spring.kafka.bootstrap-servers=localhost:9092

